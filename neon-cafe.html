<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>The Neon Café — English for All · Rank Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00e5ff; --magenta: #ff3df0; --purple: #9d4dff; --gold: #ffc83d;
  --green: #3dffa0; --red: #ff5d7a; --bg: #05050e; --panel: rgba(20, 22, 48, 0.93);
  --text: #eaf7ff; --muted: #7fd9e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: "Share Tech Mono", monospace; background-color: var(--bg);
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff88 50%, transparent 51%),
    radial-gradient(1px 1px at 70% 15%, #ffffff66 50%, transparent 51%),
    radial-gradient(2px 2px at 85% 60%, #9d4dff55 50%, transparent 51%),
    radial-gradient(1px 1px at 40% 80%, #00e5ff55 50%, transparent 51%),
    radial-gradient(2px 2px at 60% 45%, #ff3df044 50%, transparent 51%);
  background-size: 520px 520px; color: var(--text); line-height: 1.6;
  padding: 18px 10px 50px; font-size: 16px; min-height: 100vh;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(rgba(5,5,14,0.72), rgba(5,5,14,0.86)), url("nebula.jpg") center / cover no-repeat;
}
.px { font-family: "Press Start 2P", monospace; }
.es { color: var(--muted); font-size: 0.78rem; }

.ic { width: 17px; height: 17px; vertical-align: -3px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 3px currentColor); }

.mute-btn { position: fixed; top: 10px; right: 10px; z-index: 30; width: 42px; height: 42px; border-radius: 10px; border: 2px solid var(--cyan); background: var(--panel); color: var(--cyan); cursor: pointer; box-shadow: 0 0 10px #00e5ff44; }
.mute-btn:hover { box-shadow: 0 0 16px #00e5ff88; }

.cab { max-width: 560px; margin: 0 auto; position: relative; z-index: 2; }
.marquee { text-align: center; margin-bottom: 10px; }
.marquee img { height: 84px; max-width: 86%; object-fit: contain; background: #000; padding: 8px 14px; border: 2px solid var(--cyan); border-radius: 14px; box-shadow: 0 0 16px #00e5ff55, inset 0 0 12px #00e5ff22; }
.marquee .stage { font-family: "Press Start 2P", monospace; font-size: 0.62rem; color: var(--gold); letter-spacing: 1px; margin-top: 10px; text-shadow: 0 0 8px #ffc83d55; }

.screen { position: relative; background: var(--panel); border: 2px solid var(--purple); border-radius: 16px; box-shadow: 0 0 14px #9d4dff44, inset 0 0 18px #9d4dff11; overflow: hidden; }
.screen::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent 0 2px, #00000018 2px 4px); border-radius: 14px; }

.hud { display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; padding: 10px 14px; border-bottom: 1px solid #2a3a5a; font-family: "Press Start 2P", monospace; font-size: 0.56rem; letter-spacing: 1px; }
.hud .hearts { color: var(--red); font-size: 0.8rem; letter-spacing: 2px; }
.hud .xp { color: var(--gold); } .hud .coins { color: var(--green); } .hud .lvl { color: var(--cyan); }

#stage { padding: 16px 14px 20px; min-height: 340px; }

.scene-tag { font-family: "Press Start 2P", monospace; font-size: 0.6rem; color: var(--purple); text-align: center; letter-spacing: 1px; margin-bottom: 14px; text-shadow: 0 0 8px #9d4dff66; }
.timer { width: fit-content; margin: -4px auto 12px; padding: 5px 12px; border: 1px solid currentColor; border-radius: 20px; font-family: "Press Start 2P", monospace; font-size: 0.6rem; letter-spacing: 1px; color: var(--green); text-shadow: 0 0 8px currentColor; animation: popIn 0.25s ease-out; }

.scene-wrap { margin: 0 0 12px; animation: popIn 0.3s ease-out; }
.scene-wrap svg { display: block; width: 100%; height: auto; border-radius: 10px; border: 1px solid #2a3a5a; }
.scene2 { position: relative; height: 240px; border-radius: 10px; border: 1px solid #2a3a5a; overflow: hidden; background: url("bg-cafe.jpg") center 62% / cover no-repeat; }
.scene2::after { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(5,5,14,0.38) 100%); pointer-events: none; z-index: 5; }
.sc-bar { position: absolute; inset: 0; background: url("bg-cafe.jpg") center 62% / cover no-repeat; clip-path: inset(72% 0 0 0); z-index: 2; }
.sc-cust { position: absolute; left: 50%; transform: translateX(-50%); bottom: 13%; height: 66%; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55)); z-index: 1; }
.sc-cust.cust { animation: custIn 0.5s ease-out; }
.sc-tot { position: absolute; right: 20%; bottom: 11%; height: 46%; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.55)); z-index: 3; }
.sc-enri { position: absolute; right: 2%; bottom: 11%; height: 30%; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.55)); z-index: 3; }
.sc-z1 { position: absolute; right: 13%; bottom: 42%; font-family: "Press Start 2P", monospace; font-size: 10px; color: #ffd9a8; z-index: 4; }
.sc-z2 { position: absolute; right: 10%; bottom: 47%; font-family: "Press Start 2P", monospace; font-size: 8px; color: #ffd9a8; z-index: 4; }
.mimg { height: 24px; vertical-align: -7px; margin-right: 2px; }
.ava img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 6%; border-radius: 8px; display: block; }
@keyframes steamUp { 0% { transform: translateY(0); opacity: 0; } 25% { opacity: 0.65; } 100% { transform: translateY(-15px); opacity: 0; } }
.steam path { animation: steamUp 2.6s ease-out infinite; }
.steam path:nth-child(2) { animation-delay: 1.3s; }
@keyframes flick { 0%, 91%, 96%, 100% { opacity: 1; } 93%, 95% { opacity: 0.3; } }
.flicker { animation: flick 3.6s infinite; }
@keyframes twk { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.twinkle { animation: twk 2.6s infinite; }
@keyframes sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(14deg); } }
.tail { animation: sway 3.2s ease-in-out infinite; }
@keyframes zfloat { 0% { transform: translateY(0); opacity: 0; } 30% { opacity: 0.9; } 100% { transform: translateY(-16px); opacity: 0; } }
.zz { animation: zfloat 2.4s infinite; }
.zz2 { animation: zfloat 2.4s 1.2s infinite; }
@keyframes custIn { from { transform: translateX(38px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.cust { animation: custIn 0.5s ease-out; }

.row { display: flex; gap: 9px; align-items: flex-start; margin-bottom: 12px; animation: popIn 0.25s ease-out; }
.ava { flex-shrink: 0; width: 44px; height: 44px; border-radius: 10px; border: 2px solid var(--c, var(--cyan)); background: #0c0c22; display: flex; align-items: center; justify-content: center; color: var(--c, var(--cyan)); box-shadow: 0 0 10px var(--c, var(--cyan)); }
.bub { flex: 1; border: 2px solid var(--c, var(--cyan)); background: #0c0e26; border-radius: 12px; border-top-left-radius: 3px; padding: 9px 12px; }
.bub .who { font-family: "Press Start 2P", monospace; font-size: 0.5rem; color: var(--c, var(--cyan)); letter-spacing: 1px; margin-bottom: 5px; }
.bub .say { font-size: 0.98rem; line-height: 1.55; }
.replay { flex-shrink: 0; background: none; border: 1px solid var(--gold); color: var(--gold); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; }
.replay:hover { box-shadow: 0 0 10px #ffc83d66; }

.tray { border: 2px dashed #3a4a7a; border-radius: 12px; padding: 10px 12px; margin: 14px 0 10px; min-height: 64px; }
.tray .tl { font-family: "Press Start 2P", monospace; font-size: 0.5rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
.chips { display: flex; gap: 7px; flex-wrap: wrap; }
.chip { font-family: "Share Tech Mono", monospace; font-size: 0.92rem; border: 1px solid var(--cyan); color: var(--cyan); background: #00e5ff0d; border-radius: 9px; padding: 6px 11px; cursor: pointer; transition: transform 0.08s, box-shadow 0.12s; user-select: none; }
.chip:hover { box-shadow: 0 0 10px #00e5ff55; transform: translateY(-1px); }
.chip:active { transform: scale(0.95); }
.chip.intray { border-color: var(--green); color: var(--green); background: #3dffa011; }
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 7px; margin-bottom: 14px; }
.menu-grid .chip { text-align: center; }

.actions { display: flex; gap: 9px; justify-content: space-between; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 7px; font-family: "Press Start 2P", monospace; font-size: 0.58rem; background: linear-gradient(180deg, var(--magenta), #a31bd6); color: #fff; border: 2px solid #ff8df7; border-radius: 11px; padding: 12px 16px; cursor: pointer; letter-spacing: 1px; text-shadow: 0 0 6px #000; box-shadow: 0 0 14px #ff3df077; transition: transform 0.1s, box-shadow 0.15s; text-decoration: none; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px #ff3df0aa; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn.serve { background: linear-gradient(180deg, var(--green), #0e9c5c); border-color: #9fffce; box-shadow: 0 0 14px #3dffa077; color: #04180d; text-shadow: none; }
.btn.hint { background: linear-gradient(180deg, #ffb35e, #d97617); border-color: #ffd9a8; box-shadow: 0 0 14px #ff9d3d77; }
.btn.cyan { background: linear-gradient(180deg, var(--cyan), #0a7d93); border-color: #9ff1ff; box-shadow: 0 0 14px #00e5ff77; color: #04121f; text-shadow: none; }
.btn.gold { background: linear-gradient(180deg, #ffd45e, #e8a317); border-color: #ffe08a; box-shadow: 0 0 14px #ffc83d77; }
.btn .ic { filter: none; }

.center { text-align: center; }
.title-big { font-family: "Press Start 2P", monospace; font-size: clamp(1rem, 4.6vw, 1.5rem); color: var(--magenta); text-shadow: 2px 0 0 #fff, -2px 0 0 #fff, 0 2px 0 #fff, 0 -2px 0 #fff, 0 0 16px var(--magenta); letter-spacing: 2px; line-height: 1.6; margin: 16px 0 8px; }
.blink { animation: blink 1.1s steps(2, start) infinite; }
@keyframes blink { to { visibility: hidden; } }
@keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.shake { animation: shake 0.3s ease-in-out 2; }

.paws .ic { width: 27px; height: 27px; margin: 0 3px; }
.paws .off { opacity: 0.22; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
.stat { border: 1px solid #2a3a5a; border-radius: 10px; padding: 10px 6px; text-align: center; background: #10122a66; }
.stat .sl { font-family: "Press Start 2P", monospace; font-size: 0.45rem; color: var(--muted); letter-spacing: 1px; }
.stat .sv { font-family: "Press Start 2P", monospace; font-size: 0.85rem; margin-top: 7px; color: var(--gold); }

.wordchips { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin: 10px 0 4px; }
.wordchips span { border: 1px solid var(--purple); color: #d9c4ff; background: #9d4dff14; border-radius: 20px; padding: 4px 12px; font-size: 0.85rem; }

.card-reveal { width: 190px; margin: 16px auto; border: 3px solid var(--gold); border-radius: 14px; background: #0c0c22; padding: 12px 10px; text-align: center; box-shadow: 0 0 22px #ffc83d66; animation: popIn 0.5s ease-out; }
.card-reveal .rar { font-family: "Press Start 2P", monospace; font-size: 0.48rem; letter-spacing: 1px; color: var(--gold); }
.card-reveal .cface { margin: 10px 0 6px; }
.card-reveal .cname { font-family: "Press Start 2P", monospace; font-size: 0.62rem; color: #fff; letter-spacing: 1px; }
.card-reveal .cquote { font-size: 0.8rem; color: var(--muted); margin-top: 7px; font-style: italic; line-height: 1.45; }

.insert { text-align: center; font-family: "Press Start 2P", monospace; font-size: 0.58rem; color: var(--green); letter-spacing: 1px; margin-top: 14px; text-shadow: 0 0 10px #3dffa066; }
</style>
</head>

<script>
"use strict";
/* ============ ICONS ============ */
function ic(name, size) {
  const s = size || 17;
  return '<svg class="ic" style="width:' + s + 'px;height:' + s + 'px" aria-hidden="true"><use href="#i-' + name + '"/></svg>';
}

/* ============ DATA ============ */
const MENU = [
  { id: "flatwhite", label: "Flat white",       icon: "cup" },
  { id: "latte",     label: "Latte",             icon: "latte" },
  { id: "tea",       label: "Tea",               icon: "tea" },
  { id: "juice",     label: "Orange juice",      icon: "juice" },
  { id: "avotoast",  label: "Avocado toast",     icon: "toast" },
  { id: "bagel",     label: "Bagel",             icon: "bagel" },
  { id: "muffin",    label: "Blueberry muffin",  icon: "muffin" },
  { id: "cookie",    label: "Cookie",            icon: "cookie" }
];
const byId = id => MENU.find(m => m.id === id);

const ROUNDS = [
  {
    who: "MIA", sub: "customer", ava: "mia", color: "var(--cyan)",
    line: "Hi! Can I get a flat white and an avocado toast, please?", audio: "mia-order",
    order: ["flatwhite", "avotoast"],
    retryLine: "That's not my order! A flat white and an avocado toast, please.", retryAudio: "mia-retry",
    thanks: "Perfect, thank you!", thanksAudio: "mia-thanks",
    par: 20, words: ["Can I get...?", "please"]
  },
  {
    who: "JACK", sub: "customer", ava: "jack", color: "var(--magenta)",
    line: "Hello! One tea and two cookies, please.", audio: "jack-order",
    twist: "Oh wait — actually, make that an orange juice. No tea, sorry!", twistAudio: "jack-twist",
    order: ["juice", "cookie", "cookie"],
    retryLine: "Hmm, that's not it. Remember — an orange juice and two cookies!", retryAudio: "jack-retry",
    thanks: "Nice! Keep the change.", thanksAudio: "jack-thanks",
    par: 18, words: ["actually...", "make that..."]
  },
  {
    who: "VERA", sub: "food critic", ava: "vera", color: "var(--gold)", boss: true,
    intro: "Heads up, rookie — food critic at the door. Impress her and we're famous. And remember: Totti is watching.", introAudio: "dan-vera",
    line: "One latte. Two bagels. And a blueberry muffin. To go — I'm in a hurry.", audio: "vera-order",
    order: ["latte", "bagel", "bagel", "muffin"],
    retryLine: "Wrong. Again: one latte, two bagels, and one blueberry muffin. Quickly, please.", retryAudio: "vera-retry",
    thanks: "Hmm. Quick service. Noted.", thanksAudio: "vera-thanks",
    par: 32, words: ["to go", "in a hurry"]
  }
];

/* ============ STATE ============ */
let S;
function resetState() {
  S = { hearts: 3, xp: 0, coins: 0, pawsTotal: 0, round: 0, tries: 0,
        hints: 2, tray: [], twistShown: false, words: [] };
}

/* ============ AUDIO ============ */
let muted = false;
let AC = null;
const player = new Audio();
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function tone(freq, dur, type, when, vol) {
  if (muted) return;
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.type = type || "square"; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.06, c.currentTime + (when || 0));
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + (when || 0) + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + (when || 0)); o.stop(c.currentTime + (when || 0) + dur + 0.02);
  } catch (e) {}
}
const blip   = () => tone(660, 0.07);
const coinFx = () => { tone(880, 0.09); tone(1320, 0.18, "square", 0.09); };
const buzz   = () => tone(140, 0.28, "sawtooth", 0, 0.08);
const fanfare = () => { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.16, "square", i * 0.13)); };

const TEXTS = {};
function speak(text) {
  if (muted || !("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\*[^*]*\*/g, ""));
    u.lang = "en-US"; u.rate = 0.92;
    const v = speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch (e) {}
}
function stopVoice() {
  try { player.pause(); } catch (e) {}
  if ("speechSynthesis" in window) speechSynthesis.cancel();
}
function say(key, text) {
  if (text) TEXTS[key] = text;
  if (muted) return;
  stopVoice();
  player.src = "nc-" + key + ".mp3";
  player.onerror = () => speak(TEXTS[key] || "");
  player.play().catch(() => speak(TEXTS[key] || ""));
}
if ("speechSynthesis" in window) speechSynthesis.getVoices();

const AVPOS = { cat: "22% 40%" };
function bubble(who, sub, avaIcon, color, text, audioKey) {
  const avaHTML = AVIMG[avaIcon]
    ? '<img src="' + AVIMG[avaIcon] + '" alt=""' + (AVPOS[avaIcon] ? ' style="object-position:' + AVPOS[avaIcon] + '"' : "") + '>'
    : ic(avaIcon, 26);
  const r = el('<div class="row" style="--c:' + color + '">' +
    '<div class="ava">' + avaHTML + '</div>' +
    '<div class="bub"><div class="who">' + who + ' · ' + sub + '</div><div class="say">' + text + '</div></div>' +
    (audioKey ? '<button class="replay" title="Listen again" aria-label="Listen again">' + ic("vol", 16) + '</button>' : "") +
  '</div>');
  if (audioKey) r.querySelector(".replay").addEventListener("click", () => say(audioKey, text));
  return r;
}
function sameOrder(tray, target) {
  if (tray.length !== target.length) return false;
  const count = a => a.reduce((m, x) => (m[x] = (m[x] || 0) + 1, m), {});
  const ct = count(tray), cg = count(target);
  return Object.keys(cg).every(k => ct[k] === cg[k]) && Object.keys(ct).every(k => cg[k]);
}
function orderText(target) {
  const count = target.reduce((m, x) => (m[x] = (m[x] || 0) + 1, m), {});
  return Object.keys(count).map(k => count[k] + "× " + byId(k).label).join(" · ");
}

let timerInt = null, tStart = 0;
function startTimer(par, anchor) {
  clearInterval(timerInt);
  const box = el('<div class="timer" id="timerBox">' + ic("clock", 14) + ' <span id="timerVal">0.0</span>s</div>');
  anchor.insertAdjacentElement("afterend", box);
  tStart = performance.now();
  timerInt = setInterval(() => {
    const b = document.getElementById("timerBox");
    if (!b) { clearInterval(timerInt); return; }
    const e = (performance.now() - tStart) / 1000;
    document.getElementById("timerVal").textContent = e.toFixed(1);
    b.style.color = e > par ? "var(--red)" : e > par * 0.66 ? "var(--gold)" : "var(--green)";
  }, 100);
}
function stopTimer() {
  clearInterval(timerInt);
  return (performance.now() - tStart) / 1000;
}
function pawRow(paws) {
  let s = '<div class="paws" style="color:var(--gold)">';
  for (let i = 0; i < 3; i++) s += i < paws ? ic("paw", 27) : '<span class="off">' + ic("paw", 27) + '</span>';
  return s + '</div>';
}

function startRound(i) {
  S.round = i; S.tries = 0; S.tray = []; S.twistShown = false;
  const R = ROUNDS[i];
  stage.innerHTML = '<div class="scene-tag">CUSTOMER ' + (i + 1) + ' OF ' + ROUNDS.length + (R.boss ? " · ⚠ BOSS CUSTOMER" : "") + '</div>' + sceneSVG(R.ava);

  if (R.intro) {
    stage.appendChild(bubble("DAN", "manager (radio)", "headset", "var(--cyan)", R.intro, R.introAudio));
    TEXTS[R.introAudio] = R.intro;
  }
  stage.appendChild(bubble(R.who, R.sub, R.ava, R.color, R.line, R.audio));

  const trayBox = el('<div class="tray"><div class="tl">YOUR TRAY <span class="es" style="text-transform:none;">· tu bandeja (tocá para quitar)</span></div><div class="chips" id="trayChips"><span class="es">empty / vacía</span></div></div>');
  stage.appendChild(trayBox);

  const grid = el('<div class="menu-grid"></div>');
  MENU.forEach(m => {
    const c = el('<button class="chip"><img class="mimg" src="item-' + m.id + '.png" alt=""> ' + m.label + '</button>');
    c.addEventListener("click", () => { blip(); S.tray.push(m.id); renderTray(); });
    grid.appendChild(c);
  });
  stage.appendChild(grid);

  const act = el('<div class="actions">' +
    '<button class="btn hint" id="hintBtn">' + ic("paw", 15) + ' PURR BOOST ×' + S.hints + '</button>' +
    '<button class="btn serve" id="serveBtn">✓ SERVE</button></div>');
  stage.appendChild(act);

  const serveBtn = document.getElementById("serveBtn");
  const hintBtn = document.getElementById("hintBtn");
  if (S.hints <= 0) hintBtn.disabled = true;

  if (R.twist) {
    serveBtn.disabled = true;
    setTimeout(() => {
      stage.insertBefore(bubble(R.who, R.sub, R.ava, R.color, R.twist, R.twistAudio), trayBox);
      tone(392, 0.12); tone(523, 0.12, "square", 0.12);
      say(R.twistAudio, R.twist);
      S.twistShown = true; serveBtn.disabled = false;
      startTimer(R.par, stage.querySelector(".scene-tag"));
    }, 4200);
  } else {
    startTimer(R.par, stage.querySelector(".scene-tag"));
  }
  if (R.intro) { say(R.introAudio, R.intro); setTimeout(() => { if (S.round === i) say(R.audio, R.line); }, 11000); }
  else say(R.audio, R.line);

  hintBtn.addEventListener("click", () => {
    if (S.hints <= 0) return;
    S.hints--; hintBtn.innerHTML = ic("paw", 15) + ' PURR BOOST ×' + S.hints;
    if (S.hints <= 0) hintBtn.disabled = true;
    const hint = "Prrrr... they want: " + orderText(R.order) + ". You didn't hear it from me. *goes back to sleep*";
    stage.insertBefore(bubble("ENRI", "purr boost", "cat", "#ff9d3d", hint, "enri-" + i), trayBox);
    say("enri-" + i, hint);
  });

  serveBtn.addEventListener("click", () => judge());

  function renderTray() {
    const t = document.getElementById("trayChips");
    if (!S.tray.length) { t.innerHTML = '<span class="es">empty / vacía</span>'; return; }
    t.innerHTML = "";
    S.tray.forEach((id, idx) => {
      const m = byId(id);
      const c = el('<button class="chip intray"><img class="mimg" src="item-' + m.id + '.png" alt=""> ' + m.label + ' ✕</button>');
      c.addEventListener("click", () => { blip(); S.tray.splice(idx, 1); renderTray(); });
      t.appendChild(c);
    });
  }
}

function judge() {
  const R = ROUNDS[S.round];
  if (sameOrder(S.tray, R.order)) {
    const elapsed = stopTimer();
    const bonus = Math.min(25, Math.max(0, Math.round((R.par - elapsed) * 2)));
    const paws = Math.max(1, 3 - S.tries);
    const xp = R.boss ? paws * 15 : paws * 10;
    const tip = paws === 3 ? (R.boss ? 3 : 2) : 1;
    S.pawsTotal += paws; S.xp += xp + bonus; S.coins += tip; hud();
    coinFx(); if (R.boss) fanfare();
    if (bonus > 0) { tone(1568, 0.09); tone(2093, 0.14, "square", 0.09); }
    showResult(paws, xp, tip, bonus, elapsed);
  } else {
    S.tries++; S.hearts--; hud(); buzz();
    document.querySelector(".screen").classList.add("shake");
    setTimeout(() => document.querySelector(".screen").classList.remove("shake"), 700);
    if (S.hearts <= 0) { showGameOver(); return; }
    stage.insertBefore(bubble(R.who, R.sub, R.ava, R.color, R.retryLine, R.retryAudio), document.querySelector(".tray"));
    say(R.retryAudio, R.retryLine);
  }
}

function showResult(paws, xp, tip, bonus, elapsed) {
  const R = ROUNDS[S.round];
  const quips = { 3: "...Acceptable. *slow blink of approval*", 2: "Adequate. I have seen worse.", 1: "*judges you silently* ...Next time, LISTEN." };
  const speedLine = '<p class="px" style="font-size:0.55rem; color:' + (bonus > 0 ? "var(--gold)" : "var(--muted)") + '; margin-top:8px;">' + ic("clock", 13) + ' TIME ' + elapsed.toFixed(1) + 'S' + (bonus > 0 ? ' · ⚡ SPEED BONUS +' + bonus + ' XP' : '') + '</p>';
  stage.innerHTML =
    '<div class="scene-tag">ORDER COMPLETE</div>' +
    '<div class="center">' +
      '<div class="ava" style="--c:' + R.color + '; margin:8px auto; width:68px; height:68px;">' + (AVIMG[R.ava] ? '<img src="' + AVIMG[R.ava] + '" alt="">' : ic(R.ava, 34)) + '</div>' +
      '<p style="font-size:1rem; color:var(--muted); font-style:italic;">"' + R.thanks + '"</p>' +
      '<div class="ava" style="--c:var(--gold); margin:16px auto 7px; width:46px; height:46px;"><img src="sprite-totti.png" alt="" style="object-position:42% 4%"></div>' +
      '<div class="px" style="font-size:0.52rem; color:var(--gold); letter-spacing:1px;">TOTTI\'S JUDGMENT</div>' +
      '<div style="margin:8px 0;">' + pawRow(paws) + '</div>' +
      '<p style="font-size:0.88rem; color:var(--muted); font-style:italic;">"' + quips[paws] + '"</p>' +
      '<p class="px" style="font-size:0.6rem; color:var(--green); margin-top:10px;">+$' + tip + ' TIP &nbsp; +' + xp + ' XP</p>' +
      speedLine +
    '</div>';
  say(R.thanksAudio, R.thanks);
  R.words.forEach(w => { if (!S.words.includes(w)) S.words.push(w); });
  const next = S.round + 1 < ROUNDS.length;
  const btn = el('<div class="center" style="margin-top:16px;"><button class="btn cyan">' + (next ? "▶ NEXT CUSTOMER" : "🏁 END SHIFT") + '</button></div>');
  stage.appendChild(btn);
  btn.querySelector("button").addEventListener("click", () => { blip(); next ? startRound(S.round + 1) : showSummary(); });
}

function showSummary() {
  fanfare();
  const best = Math.max(S.pawsTotal, parseInt(localStorage.getItem("nc_best") || "0", 10));
  localStorage.setItem("nc_best", String(best));

  let card;
  if (S.pawsTotal >= 9)      card = { rar: "★ LEGENDARY ★", img: "sprite-totti.png", name: "TOTTI", quote: "I observe. I judge. Then I nap." };
  else if (S.pawsTotal >= 6) card = { rar: "◆ EPIC ◆",       img: "sprite-enri.png",  name: "ENRI",  quote: "I don't chase success. I nap and it finds me." };
  else                       card = { rar: "● COMMON ●",     img: "item-flatwhite.png", name: "NEON CUP", quote: "Full of potential. Refill and retry!" };

  const waMsg = encodeURIComponent("Hola Dan! 🎮 I finished THE NEON CAFÉ with " + S.pawsTotal + "/9 paws 🐾 — I want to claim my FREE trial lesson! 🚀");
  const waLink = "https://wa.me/5491123709477?text=" + waMsg;

  stage.innerHTML =
    '<div class="scene-tag">SHIFT COMPLETE · DAY 1</div>' +
    '<div class="center"><div class="title-big" style="font-size:0.95rem;">RANK UP!</div></div>' +
    '<div class="stat-grid">' +
      '<div class="stat"><div class="sl">PAWS</div><div class="sv">' + S.pawsTotal + '/9</div></div>' +
      '<div class="stat"><div class="sl">TIPS</div><div class="sv">$' + S.coins + '</div></div>' +
      '<div class="stat"><div class="sl">XP</div><div class="sv">' + S.xp + '</div></div>' +
    '</div>' +
    '<p class="px center" style="font-size:0.5rem; color:var(--muted); letter-spacing:1px;">ENGLISH YOU USED TODAY</p>' +
    '<div class="wordchips">' + S.words.map(w => "<span>" + w + "</span>").join("") + '</div>' +
    '<div class="card-reveal">' +
      '<div class="rar">' + card.rar + '</div>' +
      '<div class="cface"><img src="' + card.img + '" alt="" style="height:80px;"></div>' +
      '<div class="cname">' + card.name + '</div>' +
      '<div class="cquote">"' + card.quote + '"</div>' +
    '</div>';

  const good = S.pawsTotal >= 7;
  const danSay = good ? "Not bad for day one, rookie. Not bad at ALL. Your prize is waiting — claim it!" : "Hey, day one is hard! Run it back for a better card — or claim your prize anyway.";
  stage.appendChild(bubble("DAN", "manager (radio)", "headset", "var(--cyan)", danSay, good ? "dan-good" : "dan-ok"));
  say(good ? "dan-good" : "dan-ok", danSay);

  const acts = el('<div class="actions" style="justify-content:center; margin-top:14px;">' +
    '<a class="btn gold" href="' + waLink + '" target="_blank" rel="noopener">★ CLAIM FREE TRIAL LESSON</a>' +
    '<button class="btn cyan" id="againBtn">↻ PLAY AGAIN</button>' +
    '<button class="btn" id="shareBtn">➤ SHARE SCORE</button></div>');
  stage.appendChild(acts);

  document.getElementById("againBtn").addEventListener("click", () => { blip(); showTitle(); });
  document.getElementById("shareBtn").addEventListener("click", async () => {
    blip();
    const txt = "I scored " + S.pawsTotal + "/9 🐾 at THE NEON CAFÉ — English for All · Rank Up! 🕹️ Can you beat me? " + location.href;
    try {
      if (navigator.share) await navigator.share({ text: txt });
      else { await navigator.clipboard.writeText(txt); alert("Copied! / ¡Copiado! 📋"); }
    } catch (e) {}
  });
}

function showGameOver() {
  buzz();
  stage.innerHTML =
    '<div class="center">' +
      '<div class="title-big" style="color:var(--red); text-shadow: 0 0 16px var(--red);">SHIFT OVER</div>' +
      '<div style="color:var(--red); margin:12px 0;">' + ic("cup", 44) + '</div>' +
    '</div>';
  const danSay = "Hey — the breakfast rush gets EVERYBODY on day one. Take a breath and run it back. Enri believes in you. Probably.";
  stage.appendChild(bubble("DAN", "manager (radio)", "headset", "var(--cyan)", danSay, "dan-over"));
  say("dan-over", danSay);
  const btn = el('<div class="center" style="margin-top:16px;"><button class="btn cyan">↻ TRY AGAIN</button></div>');
  stage.appendChild(btn);
  btn.querySelector("button").addEventListener("click", () => { blip(); showTitle(); });
}

showTitle();
</script>
</body>
</html>
